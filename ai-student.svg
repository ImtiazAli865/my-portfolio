<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1230"/>
      <stop offset="100%" stop-color="#241338"/>
    </linearGradient>
    <linearGradient id="acc4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>
  <circle cx="480" cy="100" r="100" fill="#7c3aed" opacity="0.14"/>
  <circle cx="100" cy="300" r="80" fill="#06b6d4" opacity="0.12"/>

  <!-- orbit rings -->
  <ellipse cx="300" cy="200" rx="190" ry="70" fill="none" stroke="url(#acc4)" stroke-width="1.4" opacity="0.5" transform="rotate(15 300 200)"/>
  <ellipse cx="300" cy="200" rx="150" ry="150" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- graduation cap -->
  <g filter="url(#glow3)" transform="translate(300,180)">
    <polygon points="0,-40 95,-5 0,30 -95,-5" fill="#0c1230" stroke="url(#acc4)" stroke-width="2.5"/>
    <polygon points="-50,5 -50,40 0,60 50,40 50,5 0,30" fill="#0c1230" stroke="url(#acc4)" stroke-width="2"/>
    <circle cx="0" cy="-5" r="6" fill="#06b6d4"/>
    <line x1="78" y1="-15" x2="100" y2="40" stroke="#a855f7" stroke-width="2"/>
    <circle cx="100" cy="44" r="6" fill="#a855f7"/>
  </g>

  <!-- circuit nodes around -->
  <g stroke="#ffffff" stroke-width="1.3" opacity="0.35" fill="none">
    <path d="M150 120 L190 150"/>
    <path d="M450 120 L405 150"/>
    <path d="M150 290 L195 255"/>
    <path d="M450 290 L405 255"/>
  </g>
  <circle cx="150" cy="120" r="5" fill="#06b6d4"/>
  <circle cx="450" cy="120" r="5" fill="#3b82f6"/>
  <circle cx="150" cy="290" r="5" fill="#a855f7"/>
  <circle cx="450" cy="290" r="5" fill="#7c3aed"/>

  <!-- sparkles -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="220" cy="90" r="2.5"/>
    <circle cx="400" cy="310" r="2.5"/>
    <circle cx="490" cy="220" r="2"/>
    <circle cx="110" cy="200" r="2"/>
  </g>
</svg>
